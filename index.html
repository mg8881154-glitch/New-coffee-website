<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artisan Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#1A0F0A;
color:#F5E6D3;
}

h1,h2{
font-family:"Playfair Display";
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#2D1810;
position:sticky;
top:0;
}

.logo{
font-size:24px;
font-weight:bold;
}

.cart{
background:#4F9C8F;
padding:8px 14px;
border-radius:20px;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:70px;
margin-bottom:10px;
}

.btn{
background:#4F9C8F;
border:none;
padding:12px 20px;
border-radius:8px;
color:white;
cursor:pointer;
}

.products{
padding:80px 40px;
background:#2D1810;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
max-width:1100px;
margin:auto;
}

.card{
background:#3D2820;
padding:20px;
border-radius:15px;
border:1px solid #5A4034;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
font-size:20px;
font-weight:bold;
}

.form-section{
padding:100px 40px;
text-align:center;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:10px;
border-radius:6px;
border:none;
}

.error{
color:red;
font-size:14px;
}

footer{
text-align:center;
padding:40px;
background:#2D1810;
}

</style>

</head>


<body>


<header>

<div class="logo">☕ Artisan Coffee</div>

<div class="cart">
Cart: <span id="cartCount">0</span>
</div>

</header>



<section class="hero">

<h1>Experience Coffee</h1>

<p>Premium handcrafted coffee</p>

<button class="btn" onclick="scrollProducts()">
Explore Menu
</button>

</section>



<section class="products" id="products">

<h2 style="text-align:center;font-size:50px;margin-bottom:60px">
Our Coffee
</h2>


<div class="product-grid">


<div class="card">

<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">

<h3>Cappuccino</h3>

<p>Rich espresso with foam</p>

<p class="price">$3.50</p>

<button class="btn add">Add to Cart</button>

</div>



<div class="card">

<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">

<h3>Latte</h3>

<p>Creamy milk coffee</p>

<p class="price">$4.00</p>

<button class="btn add">Add to Cart</button>

</div>



<div class="card">

<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">

<h3>Mocha</h3>

<p>Chocolate espresso blend</p>

<p class="price">$4.50</p>

<button class="btn add">Add to Cart</button>

</div>


</div>

</section>



<section class="form-section">

<h2 style="font-size:50px">Order Coffee</h2>


<form id="orderForm">


<input type="text" id="name" placeholder="Your Name">
<div class="error" id="nameError"></div>


<input type="text" id="address" placeholder="Address">
<div class="error" id="addressError"></div>


<button class="btn">Place Order</button>

</form>

</section>



<footer>

<p>© 2026 Artisan Coffee</p>

</footer>



<script>


let cart=0


const buttons=document.querySelectorAll(".add")


buttons.forEach(btn=>{

btn.addEventListener("click",()=>{

cart++

document.getElementById("cartCount").innerText=cart

alert("Coffee added to cart ☕")

})

})



function scrollProducts(){

document.getElementById("products").scrollIntoView({

behavior:"smooth"

})

}



document.getElementById("orderForm").addEventListener("submit",(e)=>{

e.preventDefault()

let valid=true


const name=document.getElementById("name").value
const address=document.getElementById("address").value


document.getElementById("nameError").innerText=""
document.getElementById("addressError").innerText=""


if(name.length<3){

document.getElementById("nameError").innerText="Enter valid name"

valid=false

}


if(address.length<5){

document.getElementById("addressError").innerText="Enter valid address"

valid=false

}


if(valid){

alert("Order placed successfully ☕")

document.getElementById("orderForm").reset()

cart=0

document.getElementById("cartCount").innerText=cart

}

})


</script>


</body>
</html>
