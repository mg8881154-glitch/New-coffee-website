<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artisan Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter;background:#1A0F0A;color:#F5E6D3;}
h1,h2,h3{font-family:"Playfair Display";}

/* Loading Screen */
#loader{position:fixed;inset:0;background:#1A0F0A;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.loader-cup{font-size:60px;animation:bounce 0.8s infinite alternate;}
.loader-bar{width:200px;height:4px;background:#3D2820;border-radius:4px;overflow:hidden;}
.loader-fill{height:100%;width:0%;background:#4F9C8F;border-radius:4px;animation:fill 2s forwards;}
@keyframes bounce{to{transform:translateY(-15px)}}
@keyframes fill{to{width:100%}}

/* Header */
header{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:#2D1810;position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap;}
.logo{font-size:22px;font-weight:bold;}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.icon-btn{background:#3D2820;border:none;color:#F5E6D3;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:14px;}
.icon-btn:hover{background:#4F9C8F;}
.cart-btn{background:#4F9C8F;border:none;color:white;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:14px;}

/* Hero */
.hero{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px;}
.hero h1{font-size:70px;margin-bottom:10px;}
.btn{background:#4F9C8F;border:none;padding:12px 20px;border-radius:8px;color:white;cursor:pointer;font-size:14px;}
.btn:hover{background:#3d7a6f;}

/* Search & Filter */
.search-bar{padding:30px 40px 0;background:#2D1810;display:flex;gap:12px;flex-wrap:wrap;max-width:1100px;margin:auto;}
.search-bar input{flex:1;min-width:200px;padding:10px 14px;border-radius:8px;border:none;background:#3D2820;color:#F5E6D3;font-size:14px;}
.search-bar input::placeholder{color:#a08070;}
.search-bar select{padding:10px 14px;border-radius:8px;border:none;background:#3D2820;color:#F5E6D3;font-size:14px;}

/* Products */
.products{padding:30px 40px 80px;background:#2D1810;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;max-width:1100px;margin:auto;}
.card{background:#3D2820;padding:20px;border-radius:15px;border:1px solid #5A4034;transition:.3s;position:relative;cursor:pointer;}
.card:hover{transform:translateY(-8px);}
.card img{width:100%;border-radius:10px;height:180px;object-fit:cover;}
.price{font-size:20px;font-weight:bold;color:#4F9C8F;}

/* Wishlist heart */
.wish-btn{position:absolute;top:28px;right:28px;background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:34px;height:34px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.wish-btn.active{color:red;}

/* Stars */
.stars{color:#f5a623;font-size:16px;margin:6px 0;}

/* Qty */
.qty-control{display:flex;align-items:center;gap:10px;margin:10px 0;}
.qty-btn{background:#5A4034;border:none;color:#F5E6D3;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;}
.qty-btn:hover{background:#4F9C8F;}
.qty-num{font-size:16px;min-width:20px;text-align:center;}

/* Modal base */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;justify-content:center;align-items:center;}
.modal-overlay.open{display:flex;}
.modal{background:#2D1810;border-radius:15px;padding:30px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;position:relative;}
.modal h2{margin-bottom:15px;}
.modal-close{position:absolute;top:15px;right:20px;background:none;border:none;color:#F5E6D3;font-size:24px;cursor:pointer;}

/* Cart modal */
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #5A4034;}
.cart-remove{background:none;border:none;color:#e05555;cursor:pointer;font-size:18px;}
.cart-total{margin-top:15px;font-size:18px;font-weight:bold;text-align:right;}
.empty-cart{text-align:center;color:#a08070;padding:20px 0;}

/* Coupon */
.coupon-row{display:flex;gap:8px;margin-top:10px;}
.coupon-row input{flex:1;padding:8px 12px;border-radius:6px;border:none;background:#3D2820;color:#F5E6D3;}
.coupon-msg{font-size:13px;margin-top:5px;}
.coupon-msg.ok{color:#4F9C8F;}
.coupon-msg.err{color:#e05555;}

/* Product detail modal */
.detail-img{width:100%;border-radius:10px;height:220px;object-fit:cover;margin-bottom:15px;}
.detail-desc{color:#c0a898;margin:8px 0 12px;}

/* Wishlist modal */
.wish-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #5A4034;}

/* Order history modal */
.history-item{background:#3D2820;border-radius:8px;padding:12px;margin-bottom:10px;font-size:13px;}
.history-item .h-date{color:#a08070;font-size:12px;margin-bottom:6px;}
.history-item .h-total{font-weight:bold;color:#4F9C8F;margin-top:6px;}

/* Form */
.form-section{padding:100px 40px;text-align:center;}
form{max-width:500px;margin:auto;display:flex;flex-direction:column;gap:15px;}
input,select{padding:10px;border-radius:6px;border:none;background:#3D2820;color:#F5E6D3;font-size:14px;}
input::placeholder{color:#a08070;}
.error{color:#e05555;font-size:13px;text-align:left;}
.order-summary{background:#3D2820;border-radius:10px;padding:15px;text-align:left;font-size:14px;display:none;}
.order-summary.visible{display:block;}

/* Toast */
.toast{position:fixed;bottom:30px;right:30px;background:#4F9C8F;color:white;padding:12px 22px;border-radius:10px;font-size:15px;opacity:0;transform:translateY(20px);transition:.4s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

footer{text-align:center;padding:40px;background:#2D1810;color:#a08070;}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loader">
  <div class="loader-cup">☕</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <p style="color:#a08070;font-size:14px;">Brewing your experience...</p>
</div>

<header>
  <div class="logo">☕ Artisan Coffee</div>
  <div class="header-right">
    <button class="icon-btn" onclick="openWishlist()">❤️ Wishlist <span id="wishCount">0</span></button>
    <button class="icon-btn" onclick="openHistory()">📋 Orders</button>
    <button class="cart-btn" onclick="openCart()">🛒 Cart: <span id="cartCount">0</span></button>
  </div>
</header>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hero -->
<section class="hero">
  <h1>Experience Coffee</h1>
  <p style="color:#a08070;margin:10px 0 20px;">Premium handcrafted coffee</p>
  <button class="btn" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">Explore Menu</button>
</section>

<!-- Search & Filter -->
<div class="search-bar" id="products">
  <input type="text" id="searchInput" placeholder="🔍 Search coffee..." oninput="filterProducts()">
  <select id="sortSelect" onchange="filterProducts()">
    <option value="">Sort by</option>
    <option value="low">Price: Low to High</option>
    <option value="high">Price: High to Low</option>
    <option value="name">Name A-Z</option>
    <option value="rating">Top Rated</option>
  </select>
</div>

<!-- Products -->
<section class="products">
  <h2 style="text-align:center;font-size:46px;margin-bottom:40px;">Our Coffee</h2>
  <div class="product-grid" id="productGrid"></div>
  <p id="noResults" style="text-align:center;color:#a08070;display:none;margin-top:30px;">No coffee found ☕</p>
</section>

<!-- Order Form -->
<section class="form-section">
  <h2 style="font-size:46px;margin-bottom:30px;">Place Order</h2>
  <form id="orderForm">
    <input type="text" id="name" placeholder="Your Name">
    <div class="error" id="nameError"></div>
    <input type="text" id="address" placeholder="Address">
    <div class="error" id="addressError"></div>
    <select id="payment">
      <option value="">Select Payment Method</option>
      <option value="cod">Cash on Delivery</option>
      <option value="card">Credit / Debit Card</option>
      <option value="upi">UPI</option>
    </select>
    <div class="error" id="paymentError"></div>
    <div class="order-summary" id="orderSummary"></div>
    <button class="btn" type="submit">Place Order</button>
  </form>
</section>

<footer><p>© 2026 Artisan Coffee</p></footer>

<!-- Cart Modal -->
<div class="modal-overlay" id="cartModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('cartModal')">✕</button>
    <h2>🛒 Your Cart</h2>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal"></div>
    <div class="coupon-row">
      <input type="text" id="couponInput" placeholder="Coupon code">
      <button class="btn" onclick="applyCoupon()">Apply</button>
    </div>
    <div class="coupon-msg" id="couponMsg"></div>
    <button class="btn" style="width:100%;margin-top:15px;" onclick="closeModal('cartModal');document.getElementById('orderForm').scrollIntoView({behavior:'smooth'})">Proceed to Order</button>
  </div>
</div>

<!-- Product Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    <img class="detail-img" id="detailImg" src="" alt="">
    <h2 id="detailName"></h2>
    <div class="stars" id="detailStars"></div>
    <p class="detail-desc" id="detailDesc"></p>
    <p class="price" id="detailPrice"></p>
    <div class="qty-control">
      <button class="qty-btn" onclick="changeDetailQty(-1)">−</button>
      <span class="qty-num" id="detailQty">1</span>
      <button class="qty-btn" onclick="changeDetailQty(1)">+</button>
    </div>
    <button class="btn" style="width:100%;margin-top:10px;" onclick="addFromDetail()">Add to Cart</button>
  </div>
</div>

<!-- Wishlist Modal -->
<div class="modal-overlay" id="wishModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('wishModal')">✕</button>
    <h2>❤️ Wishlist</h2>
    <div id="wishItems"></div>
  </div>
</div>

<!-- Order History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('historyModal')">✕</button>
    <h2>📋 Order History</h2>
    <div id="historyItems"></div>
  </div>
</div>


<script>

// ── Product Data ──────────────────────────────────────────
const products = [
  { id:1, name:"Cappuccino", desc:"Rich espresso topped with velvety steamed milk foam. A classic Italian favourite.", price:3.50, img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93", rating:4.5 },
  { id:2, name:"Latte",      desc:"Smooth espresso blended with creamy steamed milk. Perfect for any time of day.", price:4.00, img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085", rating:4.7 },
  { id:3, name:"Mocha",      desc:"A rich blend of espresso, chocolate syrup and steamed milk. Dessert in a cup.", price:4.50, img:"https://images.unsplash.com/photo-1511920170033-f8396924c348", rating:4.8 },
  { id:4, name:"Espresso",   desc:"Bold, concentrated coffee shot. The foundation of all great coffee drinks.", price:2.50, img:"https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04", rating:4.3 },
  { id:5, name:"Cold Brew",  desc:"Slow-steeped for 12 hours for an ultra-smooth, naturally sweet cold coffee.", price:5.00, img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735", rating:4.6 },
  { id:6,  name:"Flat White",            desc:"Velvety microfoam espresso with a higher coffee-to-milk ratio. Barista favourite.", price:4.00,  img:"https://images.unsplash.com/photo-1572442388796-11668a67e53d", rating:4.4 },
  { id:7,  name:"Americano",             desc:"Espresso diluted with hot water for a smooth, bold black coffee experience.", price:3.00,  img:"https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd", rating:4.2 },
  { id:8,  name:"Macchiato",             desc:"Espresso stained with a dash of foamed milk. Strong yet balanced.", price:3.50,  img:"https://images.unsplash.com/photo-1485808191679-5f86510bd9d4", rating:4.4 },
  { id:9,  name:"Irish Coffee",          desc:"Hot coffee with Irish whiskey, brown sugar and whipped cream on top.", price:6.50,  img:"https://images.unsplash.com/photo-1544787219-7f47ccb76574", rating:4.6 },
  { id:10, name:"Iced Latte",            desc:"Chilled espresso poured over ice with cold milk. Refreshing and creamy.", price:4.50,  img:"https://images.unsplash.com/photo-1517701604599-bb29b565090c", rating:4.7 },
  { id:11, name:"Affogato",              desc:"A scoop of vanilla ice cream drowned in a hot espresso shot. Pure indulgence.", price:5.50,  img:"https://images.unsplash.com/photo-1568649929103-28ffbefaca1e", rating:4.9 },
  { id:12, name:"Turkish Coffee",        desc:"Finely ground coffee brewed in a cezve. Rich, strong and unfiltered.", price:3.50,  img:"https://images.unsplash.com/photo-1578374173705-969cbe6f2d6b", rating:4.5 },
  { id:13, name:"Cortado",               desc:"Equal parts espresso and warm milk. Less acidic, smooth and balanced.", price:3.50,  img:"https://images.unsplash.com/photo-1534778101976-62847782c213", rating:4.4 },
  { id:14, name:"Dalgona Coffee",        desc:"Whipped instant coffee foam over cold milk. The viral sensation.", price:4.00,  img:"https://images.unsplash.com/photo-1590080875515-8a3a8dc5735e", rating:4.7 },
  { id:15, name:"Nitro Cold Brew",       desc:"Cold brew infused with nitrogen for a creamy, stout-like texture.", price:5.50,  img:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64", rating:4.8 },
  { id:16, name:"Caramel Macchiato",     desc:"Vanilla syrup, steamed milk, espresso and caramel drizzle. Sweet perfection.", price:5.00,  img:"https://images.unsplash.com/photo-1485808191679-5f86510bd9d4", rating:4.7 },
  { id:17, name:"Hazelnut Latte",        desc:"Espresso with hazelnut syrup and creamy steamed milk. Nutty and smooth.", price:4.50,  img:"https://images.unsplash.com/photo-1517701604599-bb29b565090c", rating:4.6 },
  { id:18, name:"Coconut Latte",         desc:"Espresso with coconut milk and a hint of vanilla. Tropical and creamy.", price:5.00,  img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735", rating:4.6 },
  { id:19, name:"Matcha Latte",          desc:"Premium Japanese matcha blended with steamed milk. Earthy and calming.", price:5.50,  img:"https://images.unsplash.com/photo-1536256263959-770b48d82b0a", rating:4.7 },
  { id:20, name:"Frappuccino",           desc:"Blended ice, espresso and milk topped with whipped cream. A frozen treat.", price:5.50,  img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735", rating:4.9 },
  { id:21, name:"Iced Mocha",            desc:"Espresso, chocolate syrup, cold milk and ice. Rich and indulgent.", price:5.00,  img:"https://images.unsplash.com/photo-1511920170033-f8396924c348", rating:4.7 },
  { id:22, name:"Vienna Coffee",         desc:"Strong black coffee topped with whipped cream. An Austrian classic.", price:4.50,  img:"https://images.unsplash.com/photo-1606791405792-1004f1718d0c", rating:4.6 },
  { id:23, name:"Kopi Luwak",            desc:"The world's rarest coffee, processed through a civet cat. Earthy and smooth.", price:35.00, img:"https://images.unsplash.com/photo-1447933601403-0c6688de566e", rating:4.9 },
  { id:24, name:"Black Ivory Coffee",    desc:"Thai elephant-processed coffee. Ultra-rare, sweet and complex flavour.", price:45.00, img:"https://images.unsplash.com/photo-1504630083234-14187a9df0f5", rating:5.0 },
  { id:25, name:"Jamaican Blue Mountain",desc:"Grown at 7,500ft altitude. Mild, bright and virtually no bitterness.", price:28.00, img:"https://images.unsplash.com/photo-1498804103079-a6351b050096", rating:4.9 },
  { id:26, name:"Panama Geisha",         desc:"Floral, jasmine-like aroma with tea-like body. The most awarded coffee.", price:30.00, img:"https://images.unsplash.com/photo-1511920170033-f8396924c348", rating:5.0 },
  { id:27, name:"Hawaiian Kona",         desc:"Sun-grown on volcanic slopes of Hawaii. Rich, smooth and aromatic.", price:22.00, img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085", rating:4.8 },
  { id:28, name:"Indian Cold Coffee",    desc:"Chilled milk blended with instant coffee and sugar. Desi style creamy delight.", price:2.50,  img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735", rating:4.6 },
  { id:29, name:"Filter Coffee Shake",   desc:"South Indian filter coffee blended with cold milk and ice. Strong and refreshing.", price:3.00,  img:"https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd", rating:4.7 },
  { id:30, name:"Kesar Cold Coffee",     desc:"Saffron-infused cold coffee with chilled milk. Royal Indian treat.", price:4.00,  img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93", rating:4.9 },
  { id:31, name:"Badam Cold Coffee",     desc:"Cold coffee with almond paste and saffron. Rich Indian fusion flavour.", price:3.50,  img:"https://images.unsplash.com/photo-1517701604599-bb29b565090c", rating:4.8 },
  { id:32, name:"Rose Cold Coffee",      desc:"Cold coffee with rose syrup and chilled milk. Floral, sweet and unique.", price:3.00,  img:"https://images.unsplash.com/photo-1572442388796-11668a67e53d", rating:4.5 },
  { id:33, name:"Irani Cold Coffee",     desc:"Inspired by Irani cafes of Hyderabad. Creamy, sweet and deeply satisfying.", price:3.50,  img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085", rating:4.7 },
];

const COUPONS = { "COFFEE10": 10, "BREW20": 20, "ARTISAN15": 15 };

// ── State ─────────────────────────────────────────────────
let cart      = {};   // { id: qty }
let wishlist  = new Set();
let discount  = 0;    // percent
let currentDetailId = null;

// ── Loader ────────────────────────────────────────────────
window.addEventListener("load", () => {
  setTimeout(() => {
    const loader = document.getElementById("loader");
    loader.style.opacity = "0";
    loader.style.transition = "opacity 0.6s";
    setTimeout(() => loader.style.display = "none", 600);
  }, 2200);
});

// ── Stars helper ──────────────────────────────────────────
function starsHTML(rating) {
  const full  = Math.floor(rating);
  const half  = rating % 1 >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(empty) + ` <span style="color:#a08070;font-size:13px;">(${rating})</span>`;
}

// ── Render Products ───────────────────────────────────────
function renderProducts(list) {
  const grid = document.getElementById("productGrid");
  const none = document.getElementById("noResults");
  if (!list.length) { grid.innerHTML = ""; none.style.display = "block"; return; }
  none.style.display = "none";
  grid.innerHTML = list.map(p => `
    <div class="card" onclick="openDetail(${p.id})">
      <button class="wish-btn ${wishlist.has(p.id) ? 'active' : ''}" onclick="event.stopPropagation();toggleWish(${p.id})" title="Wishlist">
        ${wishlist.has(p.id) ? '❤️' : '🤍'}
      </button>
      <img src="${p.img}" alt="${p.name}" loading="lazy">
      <h3 style="margin:10px 0 4px;">${p.name}</h3>
      <div class="stars">${starsHTML(p.rating)}</div>
      <p style="color:#a08070;font-size:13px;margin-bottom:8px;">${p.desc.substring(0,50)}...</p>
      <p class="price">$${p.price.toFixed(2)}</p>
      <div class="qty-control" onclick="event.stopPropagation()">
        <button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button>
        <span class="qty-num" id="qty-${p.id}">0</span>
        <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
      </div>
      <button class="btn" style="width:100%" onclick="event.stopPropagation();addToCart(${p.id})">Add to Cart</button>
    </div>`).join("");
}

// ── Filter & Sort ─────────────────────────────────────────
function filterProducts() {
  const q    = document.getElementById("searchInput").value.toLowerCase();
  const sort = document.getElementById("sortSelect").value;
  let list   = products.filter(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
  if (sort === "low")    list.sort((a,b) => a.price - b.price);
  if (sort === "high")   list.sort((a,b) => b.price - a.price);
  if (sort === "name")   list.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === "rating") list.sort((a,b) => b.rating - a.rating);
  renderProducts(list);
}

// ── Qty on card ───────────────────────────────────────────
function changeQty(id, delta) {
  const el = document.getElementById(`qty-${id}`);
  if (el) el.innerText = Math.max(0, parseInt(el.innerText) + delta);
}

// ── Add to Cart ───────────────────────────────────────────
function addToCart(id) {
  const el  = document.getElementById(`qty-${id}`);
  const qty = el ? parseInt(el.innerText) : 1;
  if (qty === 0) { showToast("Select quantity first!"); return; }
  cart[id] = (cart[id] || 0) + qty;
  if (el) el.innerText = 0;
  updateCartCount();
  updateOrderSummary();
  showToast(`${products.find(p=>p.id===id).name} × ${qty} added ☕`);
}

function updateCartCount() {
  document.getElementById("cartCount").innerText = Object.values(cart).reduce((a,b)=>a+b,0);
}

// ── Product Detail Modal ──────────────────────────────────
function openDetail(id) {
  const p = products.find(x => x.id === id);
  currentDetailId = id;
  document.getElementById("detailImg").src    = p.img;
  document.getElementById("detailName").innerText = p.name;
  document.getElementById("detailStars").innerHTML = starsHTML(p.rating);
  document.getElementById("detailDesc").innerText  = p.desc;
  document.getElementById("detailPrice").innerText = `$${p.price.toFixed(2)}`;
  document.getElementById("detailQty").innerText   = 1;
  openModal("detailModal");
}

function changeDetailQty(delta) {
  const el = document.getElementById("detailQty");
  el.innerText = Math.max(1, parseInt(el.innerText) + delta);
}

function addFromDetail() {
  const qty = parseInt(document.getElementById("detailQty").innerText);
  cart[currentDetailId] = (cart[currentDetailId] || 0) + qty;
  updateCartCount();
  updateOrderSummary();
  closeModal("detailModal");
  showToast(`${products.find(p=>p.id===currentDetailId).name} × ${qty} added ☕`);
}

// ── Wishlist ──────────────────────────────────────────────
function toggleWish(id) {
  wishlist.has(id) ? wishlist.delete(id) : wishlist.add(id);
  document.getElementById("wishCount").innerText = wishlist.size;
  filterProducts();
  showToast(wishlist.has(id) ? "Added to wishlist ❤️" : "Removed from wishlist");
}

function openWishlist() {
  const container = document.getElementById("wishItems");
  if (!wishlist.size) { container.innerHTML = `<p class="empty-cart">Wishlist is empty 🤍</p>`; }
  else {
    container.innerHTML = [...wishlist].map(id => {
      const p = products.find(x => x.id === id);
      return `<div class="wish-item">
        <div>
          <strong>${p.name}</strong>
          <div class="stars" style="font-size:13px;">${starsHTML(p.rating)}</div>
          <span style="color:#4F9C8F;">$${p.price.toFixed(2)}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn" style="padding:6px 12px;font-size:12px;" onclick="closeModal('wishModal');openDetail(${id})">View</button>
          <button class="cart-remove" onclick="toggleWish(${id});openWishlist()">🗑</button>
        </div>
      </div>`;
    }).join("");
  }
  openModal("wishModal");
}

// ── Cart Modal ────────────────────────────────────────────
function openCart() {
  renderCartModal();
  document.getElementById("couponInput").value = "";
  document.getElementById("couponMsg").innerText = "";
  openModal("cartModal");
}

function renderCartModal() {
  const container = document.getElementById("cartItems");
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  if (!keys.length) {
    container.innerHTML = `<p class="empty-cart">Your cart is empty 😔</p>`;
    document.getElementById("cartTotal").innerText = "";
    return;
  }
  let subtotal = 0;
  container.innerHTML = keys.map(id => {
    const p = products.find(x => x.id == id);
    const sub = p.price * cart[id];
    subtotal += sub;
    return `<div class="cart-item">
      <span>${p.name} × ${cart[id]}</span>
      <span style="color:#4F9C8F;font-weight:bold;">$${sub.toFixed(2)}</span>
      <button class="cart-remove" onclick="removeFromCart(${id})">🗑</button>
    </div>`;
  }).join("");
  const discounted = subtotal * (1 - discount / 100);
  document.getElementById("cartTotal").innerHTML =
    discount ? `<span style="text-decoration:line-through;color:#a08070;">$${subtotal.toFixed(2)}</span>
    &nbsp; Total: $${discounted.toFixed(2)} <span style="color:#4F9C8F;font-size:13px;">(${discount}% off)</span>`
    : `Total: $${subtotal.toFixed(2)}`;
}

function removeFromCart(id) {
  delete cart[id];
  updateCartCount();
  renderCartModal();
  updateOrderSummary();
}

// ── Coupon ────────────────────────────────────────────────
function applyCoupon() {
  const code = document.getElementById("couponInput").value.trim().toUpperCase();
  const msg  = document.getElementById("couponMsg");
  if (COUPONS[code]) {
    discount = COUPONS[code];
    msg.className = "coupon-msg ok";
    msg.innerText = `✅ Coupon applied! ${discount}% discount`;
    renderCartModal();
  } else {
    discount = 0;
    msg.className = "coupon-msg err";
    msg.innerText = "❌ Invalid coupon code";
  }
}

// ── Order Summary in Form ─────────────────────────────────
function updateOrderSummary() {
  const summary = document.getElementById("orderSummary");
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  if (!keys.length) { summary.classList.remove("visible"); return; }
  let total = 0;
  const lines = keys.map(id => {
    const p = products.find(x => x.id == id);
    const sub = p.price * cart[id];
    total += sub;
    return `<div style="display:flex;justify-content:space-between;padding:4px 0;">
      <span>${p.name} × ${cart[id]}</span><span>$${sub.toFixed(2)}</span></div>`;
  }).join("");
  const final = total * (1 - discount / 100);
  summary.innerHTML = `<strong>Order Summary</strong>${lines}
    <div style="border-top:1px solid #5A4034;margin-top:8px;padding-top:8px;font-weight:bold;display:flex;justify-content:space-between;">
      <span>Total${discount ? ` (${discount}% off)` : ""}</span><span>$${final.toFixed(2)}</span></div>`;
  summary.classList.add("visible");
}

// ── Order History ─────────────────────────────────────────
function saveOrder(name, address, payment) {
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  let total = 0;
  const items = keys.map(id => {
    const p = products.find(x => x.id == id);
    const sub = p.price * cart[id];
    total += sub;
    return `${p.name} × ${cart[id]}`;
  });
  const final = total * (1 - discount / 100);
  const order = {
    date: new Date().toLocaleString(),
    name, address, payment,
    items,
    total: final.toFixed(2)
  };
  const history = JSON.parse(localStorage.getItem("coffeeOrders") || "[]");
  history.unshift(order);
  localStorage.setItem("coffeeOrders", JSON.stringify(history));
}

function openHistory() {
  const history = JSON.parse(localStorage.getItem("coffeeOrders") || "[]");
  const container = document.getElementById("historyItems");
  if (!history.length) {
    container.innerHTML = `<p class="empty-cart">No orders yet ☕</p>`;
  } else {
    container.innerHTML = history.map((o,i) => `
      <div class="history-item">
        <div class="h-date">📅 ${o.date}</div>
        <div><strong>${o.name}</strong> — ${o.address}</div>
        <div style="color:#a08070;margin-top:4px;">${o.items.join(", ")}</div>
        <div style="color:#a08070;">Payment: ${o.payment.toUpperCase()}</div>
        <div class="h-total">Total: $${o.total}</div>
      </div>`).join("");
  }
  openModal("historyModal");
}

// ── Form Submit ───────────────────────────────────────────
document.getElementById("orderForm").addEventListener("submit", e => {
  e.preventDefault();
  let valid = true;
  const name    = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const payment = document.getElementById("payment").value;
  ["nameError","addressError","paymentError"].forEach(id => document.getElementById(id).innerText = "");

  if (name.length < 3)    { document.getElementById("nameError").innerText    = "Enter a valid name (min 3 chars)"; valid = false; }
  if (address.length < 5) { document.getElementById("addressError").innerText = "Enter a valid address"; valid = false; }
  if (!payment)           { document.getElementById("paymentError").innerText = "Select a payment method"; valid = false; }
  if (!Object.keys(cart).filter(k=>cart[k]>0).length) { showToast("Add items to cart first!"); valid = false; }

  if (valid) {
    saveOrder(name, address, payment);
    showToast("Order placed successfully ☕ Thank you!");
    document.getElementById("orderForm").reset();
    cart = {}; discount = 0;
    updateCartCount();
    updateOrderSummary();
  }
});

// ── Modal helpers ─────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

document.querySelectorAll(".modal-overlay").forEach(el => {
  el.addEventListener("click", e => { if (e.target === el) el.classList.remove("open"); });
});

// ── Toast ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── Init ──────────────────────────────────────────────────
renderProducts(products);

</script>
</body>
</html>
