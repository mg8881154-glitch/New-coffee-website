<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artisan Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Inter;
  background:#1A0F0A;
  color:#F5E6D3;
}

h1,h2{font-family:"Playfair Display";}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#2D1810;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{font-size:24px;font-weight:bold;}

.cart-btn{
  background:#4F9C8F;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  border:none;
  color:#F5E6D3;
  font-size:15px;
  position:relative;
}

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{font-size:70px;margin-bottom:10px;}

.btn{
  background:#4F9C8F;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  font-size:14px;
}

.btn:hover{background:#3d7a6f;}

.products{
  padding:80px 40px;
  background:#2D1810;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:#3D2820;
  padding:20px;
  border-radius:15px;
  border:1px solid #5A4034;
  transition:.3s;
}

.card:hover{transform:translateY(-8px);}

.card img{width:100%;border-radius:10px;}

.price{font-size:20px;font-weight:bold;}

.qty-control{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
}

.qty-btn{
  background:#5A4034;
  border:none;
  color:#F5E6D3;
  width:30px;
  height:30px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.qty-btn:hover{background:#4F9C8F;}

.qty-num{font-size:16px;min-width:20px;text-align:center;}

/* Cart Modal */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:200;
  justify-content:center;
  align-items:center;
}

.modal-overlay.open{display:flex;}

.modal{
  background:#2D1810;
  border-radius:15px;
  padding:30px;
  width:90%;
  max-width:480px;
  max-height:80vh;
  overflow-y:auto;
  position:relative;
}

.modal h2{margin-top:0;}

.modal-close{
  position:absolute;
  top:15px;
  right:20px;
  background:none;
  border:none;
  color:#F5E6D3;
  font-size:24px;
  cursor:pointer;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #5A4034;
}

.cart-item-name{font-weight:500;}
.cart-item-price{color:#4F9C8F;font-weight:bold;}

.cart-remove{
  background:none;
  border:none;
  color:#e05555;
  cursor:pointer;
  font-size:18px;
}

.cart-total{
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
  text-align:right;
}

.empty-cart{text-align:center;color:#a08070;padding:20px 0;}

/* Toast */
.toast{
  position:fixed;
  bottom:30px;
  right:30px;
  background:#4F9C8F;
  color:white;
  padding:12px 22px;
  border-radius:10px;
  font-size:15px;
  opacity:0;
  transform:translateY(20px);
  transition:.4s;
  z-index:999;
  pointer-events:none;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

.form-section{
  padding:100px 40px;
  text-align:center;
}

form{
  max-width:500px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

input,select{
  padding:10px;
  border-radius:6px;
  border:none;
  background:#3D2820;
  color:#F5E6D3;
  font-size:14px;
}

input::placeholder{color:#a08070;}

.error{color:#e05555;font-size:14px;text-align:left;}

.order-summary{
  background:#3D2820;
  border-radius:10px;
  padding:15px;
  text-align:left;
  font-size:14px;
  display:none;
}

.order-summary.visible{display:block;}

footer{
  text-align:center;
  padding:40px;
  background:#2D1810;
}

</style>
</head>
<body>

<header>
  <div class="logo">☕ Artisan Coffee</div>
  <button class="cart-btn" onclick="openCart()">
    🛒 Cart: <span id="cartCount">0</span>
  </button>
</header>

<!-- Cart Modal -->
<div class="modal-overlay" id="cartModal">
  <div class="modal">
    <button class="modal-close" onclick="closeCart()">✕</button>
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal"></div>
    <button class="btn" style="width:100%;margin-top:15px;" onclick="closeCart();document.getElementById('orderForm').scrollIntoView({behavior:'smooth'})">
      Proceed to Order
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<section class="hero">
  <h1>Experience Coffee</h1>
  <p>Premium handcrafted coffee</p>
  <button class="btn" onclick="scrollProducts()">Explore Menu</button>
</section>

<section class="products" id="products">
  <h2 style="text-align:center;font-size:50px;margin-bottom:60px">Our Coffee</h2>
  <div class="product-grid" id="productGrid"></div>
</section>

<section class="form-section">
  <h2 style="font-size:50px">Place Order</h2>

  <form id="orderForm">
    <input type="text" id="name" placeholder="Your Name">
    <div class="error" id="nameError"></div>

    <input type="text" id="address" placeholder="Address">
    <div class="error" id="addressError"></div>

    <select id="payment">
      <option value="">Select Payment Method</option>
      <option value="cod">Cash on Delivery</option>
      <option value="card">Credit / Debit Card</option>
      <option value="upi">UPI</option>
    </select>
    <div class="error" id="paymentError"></div>

    <div class="order-summary" id="orderSummary"></div>

    <button class="btn" type="submit">Place Order</button>
  </form>
</section>

<footer>
  <p>© 2026 Artisan Coffee</p>
</footer>

<script>

// ── Product Data ──────────────────────────────────────────
const products = [
  { id:1, name:"Cappuccino",  desc:"Rich espresso with foam",       price:3.50, img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93" },
  { id:2, name:"Latte",       desc:"Creamy milk coffee",            price:4.00, img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085" },
  { id:3, name:"Mocha",       desc:"Chocolate espresso blend",      price:4.50, img:"https://images.unsplash.com/photo-1511920170033-f8396924c348" },
  { id:4, name:"Espresso",    desc:"Strong & bold single shot",     price:2.50, img:"https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04" },
  { id:5, name:"Cold Brew",   desc:"Smooth chilled coffee",         price:5.00, img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735" },
  { id:6, name:"Flat White",  desc:"Velvety microfoam espresso",    price:4.00, img:"https://images.unsplash.com/photo-1572442388796-11668a67e53d" },
];

// ── Cart State ────────────────────────────────────────────
let cart = {}; // { productId: quantity }

// ── Render Products ───────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById("productGrid");
  grid.innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.img}" alt="${p.name}" loading="lazy">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <p class="price">$${p.price.toFixed(2)}</p>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
        <span class="qty-num" id="qty-${p.id}">0</span>
        <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
      </div>
      <button class="btn add" onclick="addToCart(${p.id})">Add to Cart</button>
    </div>
  `).join("");
}

// ── Quantity Control ──────────────────────────────────────
function changeQty(id, delta) {
  const current = parseInt(document.getElementById(`qty-${id}`).innerText);
  const next = Math.max(0, current + delta);
  document.getElementById(`qty-${id}`).innerText = next;
}

// ── Add to Cart ───────────────────────────────────────────
function addToCart(id) {
  const qty = parseInt(document.getElementById(`qty-${id}`).innerText);
  if (qty === 0) { showToast("Select quantity first!"); return; }

  cart[id] = (cart[id] || 0) + qty;
  document.getElementById(`qty-${id}`).innerText = 0;

  updateCartCount();
  const p = products.find(x => x.id === id);
  showToast(`${p.name} × ${qty} added to cart ☕`);
  updateOrderSummary();
}

// ── Cart Count ────────────────────────────────────────────
function updateCartCount() {
  const total = Object.values(cart).reduce((a, b) => a + b, 0);
  document.getElementById("cartCount").innerText = total;
}

// ── Open / Close Cart Modal ───────────────────────────────
function openCart() {
  renderCartModal();
  document.getElementById("cartModal").classList.add("open");
}

function closeCart() {
  document.getElementById("cartModal").classList.remove("open");
}

function renderCartModal() {
  const container = document.getElementById("cartItems");
  const keys = Object.keys(cart).filter(k => cart[k] > 0);

  if (keys.length === 0) {
    container.innerHTML = `<p class="empty-cart">Your cart is empty 😔</p>`;
    document.getElementById("cartTotal").innerText = "";
    return;
  }

  let total = 0;
  container.innerHTML = keys.map(id => {
    const p = products.find(x => x.id == id);
    const subtotal = p.price * cart[id];
    total += subtotal;
    return `
      <div class="cart-item">
        <span class="cart-item-name">${p.name} × ${cart[id]}</span>
        <span class="cart-item-price">$${subtotal.toFixed(2)}</span>
        <button class="cart-remove" onclick="removeFromCart(${id})">🗑</button>
      </div>`;
  }).join("");

  document.getElementById("cartTotal").innerText = `Total: $${total.toFixed(2)}`;
}

function removeFromCart(id) {
  delete cart[id];
  updateCartCount();
  renderCartModal();
  updateOrderSummary();
}

// ── Order Summary in Form ─────────────────────────────────
function updateOrderSummary() {
  const summary = document.getElementById("orderSummary");
  const keys = Object.keys(cart).filter(k => cart[k] > 0);

  if (keys.length === 0) {
    summary.classList.remove("visible");
    return;
  }

  let total = 0;
  const lines = keys.map(id => {
    const p = products.find(x => x.id == id);
    const sub = p.price * cart[id];
    total += sub;
    return `<div style="display:flex;justify-content:space-between;padding:4px 0;">
      <span>${p.name} × ${cart[id]}</span>
      <span>$${sub.toFixed(2)}</span>
    </div>`;
  }).join("");

  summary.innerHTML = `<strong>Order Summary</strong>${lines}
    <div style="border-top:1px solid #5A4034;margin-top:8px;padding-top:8px;font-weight:bold;display:flex;justify-content:space-between;">
      <span>Total</span><span>$${total.toFixed(2)}</span>
    </div>`;
  summary.classList.add("visible");
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── Scroll ────────────────────────────────────────────────
function scrollProducts() {
  document.getElementById("products").scrollIntoView({ behavior:"smooth" });
}

// ── Form Validation & Submit ──────────────────────────────
document.getElementById("orderForm").addEventListener("submit", e => {
  e.preventDefault();
  let valid = true;

  const name    = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const payment = document.getElementById("payment").value;

  document.getElementById("nameError").innerText    = "";
  document.getElementById("addressError").innerText = "";
  document.getElementById("paymentError").innerText = "";

  if (name.length < 3) {
    document.getElementById("nameError").innerText = "Enter a valid name (min 3 chars)";
    valid = false;
  }

  if (address.length < 5) {
    document.getElementById("addressError").innerText = "Enter a valid address";
    valid = false;
  }

  if (!payment) {
    document.getElementById("paymentError").innerText = "Select a payment method";
    valid = false;
  }

  const cartKeys = Object.keys(cart).filter(k => cart[k] > 0);
  if (cartKeys.length === 0) {
    showToast("Add items to cart first!");
    valid = false;
  }

  if (valid) {
    showToast("Order placed successfully ☕ Thank you!");
    document.getElementById("orderForm").reset();
    cart = {};
    updateCartCount();
    updateOrderSummary();
  }
});

// ── Close modal on overlay click ──────────────────────────
document.getElementById("cartModal").addEventListener("click", e => {
  if (e.target === document.getElementById("cartModal")) closeCart();
});

// ── Init ──────────────────────────────────────────────────
renderProducts();

</script>
</body>
</html>
